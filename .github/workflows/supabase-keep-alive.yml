name: Supabase Keep-Alive

on:
  schedule:
    # Run every Wednesday and Sunday at 00:00 UTC
    - cron: '0 0 * * 0,3'
  workflow_dispatch: # Allow manual execution

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Packages Table
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Error: SUPABASE_URL or SUPABASE_ANON_KEY is not defined in GitHub secrets."
            exit 1
          fi
          echo "Pinging Supabase Packages table to keep instance active..."
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/packages?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
